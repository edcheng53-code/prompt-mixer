<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Prompt Mixer</title>
  <meta name="theme-color" content="#f6f3ea" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23f6f3ea'/%3E%3Ctext x='96' y='108' font-size='84' text-anchor='middle' fill='%23f97316'%3E🎛%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --surface: #fbf8f1;
      --surface-muted: #f0ede5;
      --text-main: #403b36;
      --text-soft: #6f675f;
      --accent: #F26622;
      --shadow-soft: 0 8px 26px rgba(99, 88, 77, 0.08);
      --shadow-tiny: 0 3px 10px rgba(99, 88, 77, 0.06);
    }

    body {
      background: var(--bg);
      font-family: "Inter", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
    }
    .snap-x-mandatory { scroll-snap-type: x mandatory; }
    .snap-start { scroll-snap-align: start; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    .safe-pt { padding-top: env(safe-area-inset-top); }

    .soft-card {
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .soft-pill {
      border-radius: 9999px;
      box-shadow: var(--shadow-tiny);
    }
  </style>
</head>
<body class="min-h-screen overflow-hidden text-[var(--text-main)] antialiased">
  <div class="h-screen flex flex-col">
    <header class="safe-pt px-4 pt-3 pb-2 z-20">
      <div class="soft-card rounded-[2rem] px-3 py-3">
        <div class="flex items-center gap-3">
          <div id="scenarioTabs" class="flex-1 overflow-x-auto hide-scrollbar">
            <div class="flex gap-3 min-w-max"></div>
          </div>
          <button id="addScenarioBtn" class="h-12 min-w-12 px-4 rounded-full bg-[#f97316] hover:bg-[#ea650b] text-white font-semibold transition active:scale-95 soft-pill">+
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-hidden px-4 pb-2">
      <div class="soft-card h-full rounded-[2rem] p-1.5 overflow-hidden">
        <div id="carousel" class="h-full flex overflow-x-auto snap-x-mandatory hide-scrollbar"></div>
      </div>
    </main>

    <footer class="safe-pb px-4 pb-3 pt-1 shrink-0">
      <div class="soft-card rounded-[2rem] px-3 py-3 max-w-5xl mx-auto">
        <div class="mb-2 max-w-4xl mx-auto">
          <label class="text-xs text-[var(--text-soft)] mb-1 block">語音 / 文字輸入</label>
          <textarea id="inputText" rows="2" placeholder="輸入你要追加的內容..."
            class="w-full resize-none overflow-hidden rounded-full bg-[var(--surface-muted)] px-5 py-3 text-sm text-[var(--text-main)] placeholder:text-[#9a9188] focus:outline-none focus:ring-2 focus:ring-[#f97316]/45"></textarea>
        </div>

        <div class="max-w-4xl mx-auto flex items-center gap-3">
          <button id="composeBtn"
            class="h-14 px-7 rounded-full bg-[#f97316] hover:bg-[#ea650b] text-white transition font-semibold flex items-center justify-center gap-2 shadow-[0_10px_22px_rgba(249,115,22,0.28)]">
            <span>🚀 組合並複製</span>
          </button>
          <button id="clearBtn"
            class="h-14 px-6 rounded-full bg-[var(--surface-muted)] hover:bg-[#ebe7de] transition font-semibold text-[var(--text-main)] soft-pill">
            🧹 清空
          </button>

          <div class="relative ml-auto">
            <button id="menuBtn" class="h-14 px-6 rounded-full bg-[var(--surface-muted)] hover:bg-[#ebe7de] transition font-semibold text-[var(--text-main)] flex items-center justify-center gap-2 soft-pill">💾 存檔</button>
            <div id="menuPanel" class="hidden absolute right-0 bottom-20 w-48 rounded-[1.5rem] bg-[var(--surface)] shadow-[0_14px_28px_rgba(87,74,61,0.12)] overflow-hidden p-1">
              <button id="exportBtn" class="w-full text-left px-4 py-3 hover:bg-[var(--surface-muted)] text-sm rounded-full">匯出 JSON</button>
              <button id="importBtn" class="w-full text-left px-4 py-3 hover:bg-[var(--surface-muted)] text-sm rounded-full">匯入 JSON</button>
              <input id="importFile" type="file" accept="application/json" class="hidden" />
            </div>
          </div>
        </div>

        <p id="status" class="text-xs text-[var(--text-soft)] mt-2 h-4 text-center"></p>
      </div>
    </footer>
  </div>

  <div id="modal" class="hidden fixed inset-0 z-50 bg-[#403b36]/30 backdrop-blur-sm p-5">
    <div class="max-w-xl mx-auto mt-10 rounded-[2rem] bg-[var(--surface)] p-6 shadow-[0_18px_38px_rgba(77,65,53,0.14)]">
      <h3 class="text-lg font-semibold mb-4">編輯積木</h3>
      <label class="text-sm text-[var(--text-soft)]">標題 Label</label>
      <input id="modalLabel" class="mt-2 mb-4 w-full rounded-full bg-[var(--surface-muted)] px-4 py-3" />
      <label class="text-sm text-[var(--text-soft)]">指令 Content</label>
      <textarea id="modalContent" rows="6" class="mt-2 w-full rounded-[1.25rem] bg-[var(--surface-muted)] px-4 py-3"></textarea>
      <div class="flex justify-end gap-3 mt-5">
        <button id="modalCancel" class="h-11 px-5 rounded-full bg-[var(--surface-muted)]">取消</button>
        <button id="modalSave" class="h-11 px-5 rounded-full bg-[#f97316] text-white">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "prompt_mixer_data_v1";
    const panelTitles = ["角色", "禁令", "輸出", "其他"];

    const defaultData = {
      activeScenarioId: "s1",
      scenarios: [
        {
          id: "s1",
          name: "股票投資",
          panels: [
            { title: "角色", blocks: [{ id: "b1", label: "投資專家", content: "你是一位價值投資大師，請以長期投資與風險控管角度分析。" }]},
            { title: "禁令", blocks: [{ id: "b2", label: "避免幻覺", content: "若資訊不足請明確說明，不可虛構數據來源。" }]},
            { title: "輸出", blocks: [{ id: "b3", label: "表格輸出", content: "請以表格呈現重點：標的、理由、風險、結論。" }]},
            { title: "其他", blocks: [{ id: "b4", label: "語氣", content: "使用清楚、精簡、可執行的條列式語氣。" }]}
          ]
        }
      ],
      selectedBlockIdsByScenario: { s1: [] },
      inputTextByScenario: { s1: "" }
    };

    let mixerData = loadData();
    let editingCtx = null;

    function uid(prefix="id"){ return prefix + "_" + Math.random().toString(36).slice(2,8); }
    function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(mixerData)); }
    function loadData(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return structuredClone(defaultData);
        const parsed = JSON.parse(raw);
        parsed.selectedBlockIdsByScenario ||= {};
        parsed.inputTextByScenario ||= {};
        parsed.scenarios ||= [];
        if (!parsed.activeScenarioId && parsed.scenarios[0]) parsed.activeScenarioId = parsed.scenarios[0].id;
        return parsed;
      } catch {
        return structuredClone(defaultData);
      }
    }
    function getActiveScenario(){
      return mixerData.scenarios.find(s => s.id === mixerData.activeScenarioId) || mixerData.scenarios[0];
    }
    function getSelectedSet(sid){
      if(!mixerData.selectedBlockIdsByScenario[sid]) mixerData.selectedBlockIdsByScenario[sid] = [];
      return new Set(mixerData.selectedBlockIdsByScenario[sid]);
    }
    function setSelectedSet(sid, set){ mixerData.selectedBlockIdsByScenario[sid] = [...set]; }
    function showStatus(msg){
      const el = document.getElementById("status");
      el.textContent = msg;
      clearTimeout(showStatus._t);
      showStatus._t = setTimeout(() => el.textContent = "", 1800);
    }

    function renderScenarioTabs(){
      const container = document.querySelector("#scenarioTabs > div");
      container.innerHTML = "";
      mixerData.scenarios.forEach(sc => {
        const active = sc.id === mixerData.activeScenarioId;
        const btn = document.createElement("button");
        btn.className = `h-10 px-4 rounded-full text-sm whitespace-nowrap transition ${active ? "bg-[#fff2e8] text-[#a34b00] ring-2 ring-[var(--accent)] shadow-[0_6px_16px_rgba(242,102,34,0.18)]" : "bg-[var(--surface-muted)] text-[var(--text-main)] hover:bg-[#ebe7de] soft-pill"}`;
        btn.textContent = sc.name;
        btn.onclick = () => { mixerData.activeScenarioId = sc.id; saveData(); renderAll(); };
        attachLongPress(btn, () => {
          const action = prompt(`場景：${sc.name}\n輸入新名稱可重新命名；輸入 /delete 刪除此場景`);
          if (action === null) return;
          if (action.trim() === "/delete") {
            if (mixerData.scenarios.length <= 1) return showStatus("至少保留一個場景");
            mixerData.scenarios = mixerData.scenarios.filter(x => x.id !== sc.id);
            delete mixerData.selectedBlockIdsByScenario[sc.id];
            delete mixerData.inputTextByScenario[sc.id];
            if (mixerData.activeScenarioId === sc.id) mixerData.activeScenarioId = mixerData.scenarios[0].id;
          } else if (action.trim()) {
            sc.name = action.trim();
          }
          saveData(); renderAll();
        });
        container.appendChild(btn);
      });
    }

    function renderPanels(){
      const carousel = document.getElementById("carousel");
      const sc = getActiveScenario();
      if(!sc) return;
      while(sc.panels.length < 4){ sc.panels.push({ title: panelTitles[sc.panels.length], blocks: [] }); }

      carousel.innerHTML = "";
      sc.panels.forEach((panel, pIdx) => {
        const section = document.createElement("section");
        section.className = "snap-start min-w-full h-full p-3 flex flex-col";
        section.innerHTML = `
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-lg font-semibold text-[var(--text-main)]">${panel.title}</h2>
            <button class="add-block h-9 px-4 rounded-full bg-[var(--surface-muted)] hover:bg-[#e9e4da] text-sm soft-pill">+ 新增積木</button>
          </div>
          <div class="grid grid-cols-3 gap-2 md:gap-3 overflow-y-auto pb-2 flex-1"></div>
        `;

        section.querySelector(".add-block").onclick = () => {
          panel.blocks.push({ id: uid("b"), label: "新積木", content: "請輸入指令內容" });
          saveData(); renderAll();
        };

        const grid = section.querySelector(".grid");
        const selected = getSelectedSet(sc.id);

        panel.blocks.forEach(block => {
          const isSel = selected.has(block.id);
          const b = document.createElement("button");
          b.className = `w-full h-12 rounded-full px-3 text-sm leading-tight text-center whitespace-nowrap text-ellipsis overflow-hidden transition shadow-[0_4px_12px_rgba(95,86,78,0.08)] ${isSel ? "bg-[#fff5ef] border-2 border-[var(--accent)] text-[#8b4a18]" : "bg-[var(--surface-muted)] border-2 border-transparent text-[var(--text-main)] hover:bg-[#ebe7de]"}`;
          b.textContent = block.label;
          b.onclick = () => {
            const s = getSelectedSet(sc.id);
            if (s.has(block.id)) s.delete(block.id); else s.add(block.id);
            setSelectedSet(sc.id, s);
            saveData(); renderAll();
          };
          attachLongPress(b, () => openEditModal(sc.id, pIdx, block.id));
          grid.appendChild(b);
        });

        carousel.appendChild(section);
      });
    }

    function renderInput(){
      const sc = getActiveScenario();
      const ta = document.getElementById("inputText");
      ta.value = mixerData.inputTextByScenario[sc.id] || "";
      autoResize(ta);
    }

    function renderAll(){
      renderScenarioTabs();
      renderPanels();
      renderInput();
      saveData();
      lucide.createIcons();
    }

    function attachLongPress(el, onLongPress, ms=450){
      let timer = null, triggered = false;
      const start = (e) => { triggered = false; timer = setTimeout(()=>{ triggered=true; onLongPress(e); }, ms); };
      const cancel = () => { clearTimeout(timer); };
      el.addEventListener("touchstart", start, {passive:true});
      el.addEventListener("mousedown", start);
      ["touchend","touchcancel","mouseup","mouseleave"].forEach(evt => el.addEventListener(evt, cancel));
      el.addEventListener("click", (e)=>{ if(triggered){ e.preventDefault(); e.stopImmediatePropagation(); } }, true);
    }

    function openEditModal(sid, panelIndex, blockId){
      editingCtx = { sid, panelIndex, blockId };
      const sc = mixerData.scenarios.find(s=>s.id===sid);
      const block = sc.panels[panelIndex].blocks.find(b=>b.id===blockId);
      document.getElementById("modalLabel").value = block.label;
      document.getElementById("modalContent").value = block.content;
      document.getElementById("modal").classList.remove("hidden");
    }
    function closeModal(){ document.getElementById("modal").classList.add("hidden"); editingCtx = null; }

    function composePrompt(){
      const sc = getActiveScenario();
      const selected = getSelectedSet(sc.id);
      const byTitle = Object.fromEntries(sc.panels.map(p=>[p.title, []]));
      sc.panels.forEach(p=> p.blocks.forEach(b=>{ if(selected.has(b.id)) byTitle[p.title].push(b.content.trim()); }));

      const pieces = [
        `場景：${sc.name}`,
        byTitle["角色"]?.length ? `【角色】\n- ${byTitle["角色"].join("\n- ")}` : "",
        byTitle["禁令"]?.length ? `【禁令】\n- ${byTitle["禁令"].join("\n- ")}` : "",
        byTitle["輸出"]?.length ? `【輸出】\n- ${byTitle["輸出"].join("\n- ")}` : "",
        byTitle["其他"]?.length ? `【其他】\n- ${byTitle["其他"].join("\n- ")}` : "",
        (mixerData.inputTextByScenario[sc.id] || "").trim() ? `【補充】\n${mixerData.inputTextByScenario[sc.id].trim()}` : ""
      ].filter(Boolean);
      return pieces.join("\n\n");
    }

    function exportJSON(){
      const blob = new Blob([JSON.stringify(mixerData, null, 2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `prompt-mixer-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      showStatus("已匯出 JSON");
    }

    function importJSON(file){
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if(!data.scenarios || !Array.isArray(data.scenarios)) throw new Error("格式錯誤");
          mixerData = data;
          mixerData.selectedBlockIdsByScenario ||= {};
          mixerData.inputTextByScenario ||= {};
          if(!mixerData.activeScenarioId && mixerData.scenarios[0]) mixerData.activeScenarioId = mixerData.scenarios[0].id;
          saveData(); renderAll();
          showStatus("匯入成功");
        } catch { showStatus("匯入失敗：JSON 格式不正確"); }
      };
      reader.readAsText(file);
    }

    function autoResize(el){
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 180) + "px";
    }

    function setupPWA(){
      const manifest = {
        name: "Prompt Mixer",
        short_name: "Mixer",
        display: "standalone",
        background_color: "#f6f3ea",
        theme_color: "#f6f3ea",
        start_url: ".",
        icons: [{
          src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23f6f3ea'/%3E%3Ctext x='96' y='108' font-size='84' text-anchor='middle' fill='%23f97316'%3E🎛%3C/text%3E%3C/svg%3E",
          sizes: "192x192",
          type: "image/svg+xml"
        }]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type: "application/manifest+json"});
      const manifestURL = URL.createObjectURL(manifestBlob);
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = manifestURL;
      document.head.appendChild(link);

      if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
        const swCode = `self.addEventListener('install', e => self.skipWaiting());self.addEventListener('activate', e => self.clients.claim());self.addEventListener('fetch', () => {});`;
        const swBlob = new Blob([swCode], { type: "text/javascript" });
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL).catch(()=>{});
      }
    }

    document.getElementById("addScenarioBtn").onclick = () => {
      const name = prompt("新場景名稱？");
      if(!name || !name.trim()) return;
      const id = uid("s");
      mixerData.scenarios.push({ id, name: name.trim(), panels: panelTitles.map(t => ({ title: t, blocks: [] })) });
      mixerData.selectedBlockIdsByScenario[id] = [];
      mixerData.inputTextByScenario[id] = "";
      mixerData.activeScenarioId = id;
      saveData(); renderAll();
    };

    document.getElementById("inputText").addEventListener("input", (e)=>{
      const sc = getActiveScenario();
      mixerData.inputTextByScenario[sc.id] = e.target.value;
      autoResize(e.target);
      saveData();
    });

    document.getElementById("composeBtn").onclick = async () => {
      const text = composePrompt();
      try { await navigator.clipboard.writeText(text); showStatus("已組合並複製到剪貼簿"); }
      catch { showStatus("無法存取剪貼簿，請手動複製"); alert(text); }
    };

    document.getElementById("clearBtn").onclick = () => {
      const sc = getActiveScenario();
      mixerData.selectedBlockIdsByScenario[sc.id] = [];
      mixerData.inputTextByScenario[sc.id] = "";
      saveData(); renderAll();
      showStatus("已清空");
    };

    document.getElementById("menuBtn").onclick = () => { document.getElementById("menuPanel").classList.toggle("hidden"); };
    document.getElementById("exportBtn").onclick = exportJSON;
    document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
    document.getElementById("importFile").onchange = (e) => {
      const f = e.target.files?.[0];
      if (f) importJSON(f);
      e.target.value = "";
    };

    document.getElementById("modalCancel").onclick = closeModal;
    document.getElementById("modal").addEventListener("click", (e)=>{ if(e.target.id === "modal") closeModal(); });
    document.getElementById("modalSave").onclick = () => {
      if(!editingCtx) return;
      const { sid, panelIndex, blockId } = editingCtx;
      const sc = mixerData.scenarios.find(s=>s.id===sid);
      const block = sc.panels[panelIndex].blocks.find(b=>b.id===blockId);
      block.label = document.getElementById("modalLabel").value.trim() || block.label;
      block.content = document.getElementById("modalContent").value.trim();
      saveData(); renderAll(); closeModal(); showStatus("積木已更新");
    };

    setupPWA();
    renderAll();
  </script>
</body>
</html>
