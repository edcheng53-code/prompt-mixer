<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Prompt Mixer</title>
  <meta name="theme-color" content="#121212" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23121212'/%3E%3Ctext x='96' y='108' font-size='84' text-anchor='middle' fill='%233b82f6'%3E🎛%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { color-scheme: dark; }
    body { background: #121212; }
    .snap-x-mandatory { scroll-snap-type: x mandatory; }
    .snap-start { scroll-snap-align: start; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    .safe-pt { padding-top: env(safe-area-inset-top); }
  </style>
</head>
<body class="text-gray-100 min-h-screen overflow-hidden">
  <div class="h-screen flex flex-col">
    <header class="safe-pt px-3 pt-2 pb-2 border-b border-gray-800 bg-[#121212]/95 backdrop-blur z-20">
      <div class="flex items-center gap-2">
        <div id="scenarioTabs" class="flex-1 overflow-x-auto hide-scrollbar">
          <div class="flex gap-2 min-w-max"></div>
        </div>
        <button id="addScenarioBtn" class="h-12 min-w-12 px-3 rounded-xl bg-blue-600 hover:bg-blue-500 active:scale-95 transition font-bold">+
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-hidden">
      <div id="carousel" class="h-full flex overflow-x-auto snap-x-mandatory hide-scrollbar"></div>
    </main>

    <footer class="safe-pb border-t border-gray-800 bg-[#151515] px-3 pt-2 pb-3 shrink-0">
      <div class="mb-2">
        <label class="text-xs text-gray-400 mb-1 block">語音 / 文字輸入</label>
        <textarea id="inputText" rows="2" placeholder="輸入你要追加的內容..."
          class="w-full resize-none overflow-hidden rounded-xl bg-gray-900 border border-gray-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <div class="flex items-center gap-2">
        <button id="composeBtn"
          class="h-16 basis-4/5 rounded-xl bg-blue-600 hover:bg-blue-500 active:scale-[0.98] transition font-semibold flex items-center justify-center gap-2">
          <span>🚀 組合並複製</span>
        </button>
        <button id="clearBtn"
          class="h-16 basis-1/5 rounded-xl bg-gray-700 hover:bg-gray-600 active:scale-[0.98] transition font-semibold">
          🧹 清空
        </button>

        <div class="relative">
          <button id="menuBtn" class="h-16 w-14 rounded-xl bg-gray-800 hover:bg-gray-700 flex items-center justify-center">💾</button>
          <div id="menuPanel" class="hidden absolute right-0 bottom-20 w-44 rounded-xl border border-gray-700 bg-gray-900 shadow-xl overflow-hidden">
            <button id="exportBtn" class="w-full text-left px-3 py-3 hover:bg-gray-800 text-sm">匯出 JSON</button>
            <button id="importBtn" class="w-full text-left px-3 py-3 hover:bg-gray-800 text-sm">匯入 JSON</button>
            <input id="importFile" type="file" accept="application/json" class="hidden" />
          </div>
        </div>
      </div>

      <p id="status" class="text-xs text-gray-400 mt-2 h-4"></p>
    </footer>
  </div>

  <div id="modal" class="hidden fixed inset-0 z-50 bg-black/60 p-4">
    <div class="max-w-xl mx-auto mt-10 rounded-2xl border border-gray-700 bg-gray-900 p-4">
      <h3 class="text-lg font-semibold mb-3">編輯積木</h3>
      <label class="text-sm text-gray-300">標題 Label</label>
      <input id="modalLabel" class="mt-1 mb-3 w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2" />
      <label class="text-sm text-gray-300">指令 Content</label>
      <textarea id="modalContent" rows="6" class="mt-1 w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2"></textarea>
      <div class="flex justify-end gap-2 mt-4">
        <button id="modalCancel" class="h-11 px-4 rounded-lg bg-gray-700">取消</button>
        <button id="modalSave" class="h-11 px-4 rounded-lg bg-blue-600">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "prompt_mixer_data_v1";
    const panelTitles = ["角色", "禁令", "輸出", "其他"];

    const defaultData = {
      activeScenarioId: "s1",
      scenarios: [
        {
          id: "s1",
          name: "股票投資",
          panels: [
            { title: "角色", blocks: [{ id: "b1", label: "投資專家", content: "你是一位價值投資大師，請以長期投資與風險控管角度分析。" }]},
            { title: "禁令", blocks: [{ id: "b2", label: "避免幻覺", content: "若資訊不足請明確說明，不可虛構數據來源。" }]},
            { title: "輸出", blocks: [{ id: "b3", label: "表格輸出", content: "請以表格呈現重點：標的、理由、風險、結論。" }]},
            { title: "其他", blocks: [{ id: "b4", label: "語氣", content: "使用清楚、精簡、可執行的條列式語氣。" }]}
          ]
        }
      ],
      selectedBlockIdsByScenario: { s1: [] },
      inputTextByScenario: { s1: "" }
    };

    let mixerData = loadData();
    let editingCtx = null;

    function uid(prefix="id"){ return prefix + "_" + Math.random().toString(36).slice(2,8); }
    function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(mixerData)); }
    function loadData(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return structuredClone(defaultData);
        const parsed = JSON.parse(raw);
        parsed.selectedBlockIdsByScenario ||= {};
        parsed.inputTextByScenario ||= {};
        parsed.scenarios ||= [];
        if (!parsed.activeScenarioId && parsed.scenarios[0]) parsed.activeScenarioId = parsed.scenarios[0].id;
        return parsed;
      } catch {
        return structuredClone(defaultData);
      }
    }
    function getActiveScenario(){
      return mixerData.scenarios.find(s => s.id === mixerData.activeScenarioId) || mixerData.scenarios[0];
    }
    function getSelectedSet(sid){
      if(!mixerData.selectedBlockIdsByScenario[sid]) mixerData.selectedBlockIdsByScenario[sid] = [];
      return new Set(mixerData.selectedBlockIdsByScenario[sid]);
    }
    function setSelectedSet(sid, set){ mixerData.selectedBlockIdsByScenario[sid] = [...set]; }
    function showStatus(msg){
      const el = document.getElementById("status");
      el.textContent = msg;
      clearTimeout(showStatus._t);
      showStatus._t = setTimeout(() => el.textContent = "", 1800);
    }

    function renderScenarioTabs(){
      const container = document.querySelector("#scenarioTabs > div");
      container.innerHTML = "";
      mixerData.scenarios.forEach(sc => {
        const active = sc.id === mixerData.activeScenarioId;
        const btn = document.createElement("button");
        btn.className = `h-12 px-4 rounded-xl border text-sm whitespace-nowrap ${active ? "bg-blue-900/40 border-blue-500 text-blue-200" : "bg-gray-900 border-gray-700 text-gray-200"}`;
        btn.textContent = sc.name;
        btn.onclick = () => { mixerData.activeScenarioId = sc.id; saveData(); renderAll(); };
        attachLongPress(btn, () => {
          const action = prompt(`場景：${sc.name}\n輸入新名稱可重新命名；輸入 /delete 刪除此場景`);
          if (action === null) return;
          if (action.trim() === "/delete") {
            if (mixerData.scenarios.length <= 1) return showStatus("至少保留一個場景");
            mixerData.scenarios = mixerData.scenarios.filter(x => x.id !== sc.id);
            delete mixerData.selectedBlockIdsByScenario[sc.id];
            delete mixerData.inputTextByScenario[sc.id];
            if (mixerData.activeScenarioId === sc.id) mixerData.activeScenarioId = mixerData.scenarios[0].id;
          } else if (action.trim()) {
            sc.name = action.trim();
          }
          saveData(); renderAll();
        });
        container.appendChild(btn);
      });
    }

    function renderPanels(){
      const carousel = document.getElementById("carousel");
      const sc = getActiveScenario();
      if(!sc) return;
      while(sc.panels.length < 4){ sc.panels.push({ title: panelTitles[sc.panels.length], blocks: [] }); }

      carousel.innerHTML = "";
      sc.panels.forEach((panel, pIdx) => {
        const section = document.createElement("section");
        section.className = "snap-start min-w-full h-full p-3 flex flex-col";
        section.innerHTML = `
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-lg font-semibold">${panel.title}</h2>
            <button class="add-block h-10 px-3 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm">+ 新增積木</button>
          </div>
          <div class="grid grid-cols-3 gap-2 overflow-y-auto pb-2 flex-1"></div>
        `;

        section.querySelector(".add-block").onclick = () => {
          panel.blocks.push({ id: uid("b"), label: "新積木", content: "請輸入指令內容" });
          saveData(); renderAll();
        };

        const grid = section.querySelector(".grid");
        const selected = getSelectedSet(sc.id);

        panel.blocks.forEach(block => {
          const isSel = selected.has(block.id);
          const b = document.createElement("button");
          b.className = `min-h-16 h-16 rounded-xl border px-2 text-sm leading-tight text-left overflow-hidden ${isSel ? "border-2 border-blue-500 bg-blue-900/30" : "border-gray-700 bg-gray-900"}`;
          b.textContent = block.label;
          b.onclick = () => {
            const s = getSelectedSet(sc.id);
            if (s.has(block.id)) s.delete(block.id); else s.add(block.id);
            setSelectedSet(sc.id, s);
            saveData(); renderAll();
          };
          attachLongPress(b, () => openEditModal(sc.id, pIdx, block.id));
          grid.appendChild(b);
        });

        carousel.appendChild(section);
      });
    }

    function renderInput(){
      const sc = getActiveScenario();
      const ta = document.getElementById("inputText");
      ta.value = mixerData.inputTextByScenario[sc.id] || "";
      autoResize(ta);
    }

    function renderAll(){
      renderScenarioTabs();
      renderPanels();
      renderInput();
      saveData();
      lucide.createIcons();
    }

    function attachLongPress(el, onLongPress, ms=450){
      let timer = null, triggered = false;
      const start = (e) => { triggered = false; timer = setTimeout(()=>{ triggered=true; onLongPress(e); }, ms); };
      const cancel = () => { clearTimeout(timer); };
      el.addEventListener("touchstart", start, {passive:true});
      el.addEventListener("mousedown", start);
      ["touchend","touchcancel","mouseup","mouseleave"].forEach(evt => el.addEventListener(evt, cancel));
      el.addEventListener("click", (e)=>{ if(triggered){ e.preventDefault(); e.stopImmediatePropagation(); } }, true);
    }

    function openEditModal(sid, panelIndex, blockId){
      editingCtx = { sid, panelIndex, blockId };
      const sc = mixerData.scenarios.find(s=>s.id===sid);
      const block = sc.panels[panelIndex].blocks.find(b=>b.id===blockId);
      document.getElementById("modalLabel").value = block.label;
      document.getElementById("modalContent").value = block.content;
      document.getElementById("modal").classList.remove("hidden");
    }
    function closeModal(){ document.getElementById("modal").classList.add("hidden"); editingCtx = null; }

    function composePrompt(){
      const sc = getActiveScenario();
      const selected = getSelectedSet(sc.id);
      const byTitle = Object.fromEntries(sc.panels.map(p=>[p.title, []]));
      sc.panels.forEach(p=> p.blocks.forEach(b=>{ if(selected.has(b.id)) byTitle[p.title].push(b.content.trim()); }));

      const pieces = [
        `場景：${sc.name}`,
        byTitle["角色"]?.length ? `【角色】\n- ${byTitle["角色"].join("\n- ")}` : "",
        byTitle["禁令"]?.length ? `【禁令】\n- ${byTitle["禁令"].join("\n- ")}` : "",
        byTitle["輸出"]?.length ? `【輸出】\n- ${byTitle["輸出"].join("\n- ")}` : "",
        byTitle["其他"]?.length ? `【其他】\n- ${byTitle["其他"].join("\n- ")}` : "",
        (mixerData.inputTextByScenario[sc.id] || "").trim() ? `【補充】\n${mixerData.inputTextByScenario[sc.id].trim()}` : ""
      ].filter(Boolean);
      return pieces.join("\n\n");
    }

    function exportJSON(){
      const blob = new Blob([JSON.stringify(mixerData, null, 2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `prompt-mixer-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      showStatus("已匯出 JSON");
    }

    function importJSON(file){
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if(!data.scenarios || !Array.isArray(data.scenarios)) throw new Error("格式錯誤");
          mixerData = data;
          mixerData.selectedBlockIdsByScenario ||= {};
          mixerData.inputTextByScenario ||= {};
          if(!mixerData.activeScenarioId && mixerData.scenarios[0]) mixerData.activeScenarioId = mixerData.scenarios[0].id;
          saveData(); renderAll();
          showStatus("匯入成功");
        } catch { showStatus("匯入失敗：JSON 格式不正確"); }
      };
      reader.readAsText(file);
    }

    function autoResize(el){
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 180) + "px";
    }

    function setupPWA(){
      const manifest = {
        name: "Prompt Mixer",
        short_name: "Mixer",
        display: "standalone",
        background_color: "#121212",
        theme_color: "#121212",
        start_url: ".",
        icons: [{
          src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23121212'/%3E%3Ctext x='96' y='108' font-size='84' text-anchor='middle' fill='%233b82f6'%3E🎛%3C/text%3E%3C/svg%3E",
          sizes: "192x192",
          type: "image/svg+xml"
        }]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type: "application/manifest+json"});
      const manifestURL = URL.createObjectURL(manifestBlob);
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = manifestURL;
      document.head.appendChild(link);

      if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
        const swCode = `self.addEventListener('install', e => self.skipWaiting());self.addEventListener('activate', e => self.clients.claim());self.addEventListener('fetch', () => {});`;
        const swBlob = new Blob([swCode], { type: "text/javascript" });
        const swURL = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swURL).catch(()=>{});
      }
    }

    document.getElementById("addScenarioBtn").onclick = () => {
      const name = prompt("新場景名稱？");
      if(!name || !name.trim()) return;
      const id = uid("s");
      mixerData.scenarios.push({ id, name: name.trim(), panels: panelTitles.map(t => ({ title: t, blocks: [] })) });
      mixerData.selectedBlockIdsByScenario[id] = [];
      mixerData.inputTextByScenario[id] = "";
      mixerData.activeScenarioId = id;
      saveData(); renderAll();
    };

    document.getElementById("inputText").addEventListener("input", (e)=>{
      const sc = getActiveScenario();
      mixerData.inputTextByScenario[sc.id] = e.target.value;
      autoResize(e.target);
      saveData();
    });

    document.getElementById("composeBtn").onclick = async () => {
      const text = composePrompt();
      try { await navigator.clipboard.writeText(text); showStatus("已組合並複製到剪貼簿"); }
      catch { showStatus("無法存取剪貼簿，請手動複製"); alert(text); }
    };

    document.getElementById("clearBtn").onclick = () => {
      const sc = getActiveScenario();
      mixerData.selectedBlockIdsByScenario[sc.id] = [];
      mixerData.inputTextByScenario[sc.id] = "";
      saveData(); renderAll();
      showStatus("已清空");
    };

    document.getElementById("menuBtn").onclick = () => { document.getElementById("menuPanel").classList.toggle("hidden"); };
    document.getElementById("exportBtn").onclick = exportJSON;
    document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
    document.getElementById("importFile").onchange = (e) => {
      const f = e.target.files?.[0];
      if (f) importJSON(f);
      e.target.value = "";
    };

    document.getElementById("modalCancel").onclick = closeModal;
    document.getElementById("modal").addEventListener("click", (e)=>{ if(e.target.id === "modal") closeModal(); });
    document.getElementById("modalSave").onclick = () => {
      if(!editingCtx) return;
      const { sid, panelIndex, blockId } = editingCtx;
      const sc = mixerData.scenarios.find(s=>s.id===sid);
      const block = sc.panels[panelIndex].blocks.find(b=>b.id===blockId);
      block.label = document.getElementById("modalLabel").value.trim() || block.label;
      block.content = document.getElementById("modalContent").value.trim();
      saveData(); renderAll(); closeModal(); showStatus("積木已更新");
    };

    setupPWA();
    renderAll();
  </script>
</body>
</html>
